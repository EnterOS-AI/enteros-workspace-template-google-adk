name: Google ADK Agent
description: >-
  Gemini agent powered by Google's Agent Development Kit (ADK). ADK is the
  agent engine (LlmAgent + Runner); platform tools (delegate / memory / peers /
  messaging) reach the agent via ADK's native MCPToolset pointed at the
  workspace a2a_mcp_server. Platform-managed by default (keyless, metered Gemini
  via Molecule's LLM proxy). BYOK optional: GOOGLE_API_KEY (AI Studio) — or Vertex
  via GOOGLE_GENAI_USE_VERTEXAI=1 + GOOGLE_CLOUD_PROJECT.
version: 1.0.0
tier: 2

runtime: google-adk

runtime_config:
  # Platform-managed by default: keyless, metered Gemini via Molecule's LLM
  # proxy (no GOOGLE_API_KEY needed). `platform:gemini-2.5-pro` resolves to the
  # closed `platform` provider in the registry SSOT (cp#511/core#2182).
  # _routing.py routes through the proxy purely because provider==platform (the
  # `platform:`/`vertex:` namespace) — NOT a billing-mode env. required_env=[]
  # is DERIVED, not hand-authored. BYOK options in models[] below.
  model: platform:gemini-2.5-pro
  required_env: []

# Top-level models[] — the authoritative servability source for this runtime
# (langgraph-style; the registry projection is a subset of this).
models:
  # Every id MUST be registered for google-adk in the provider-registry SSOT
  # (CP providers.yaml runtimes.google-adk) or workspace create returns 422
  # UNREGISTERED_MODEL_FOR_RUNTIME. Registered ids: vertex:gemini-2.5-pro
  # (exact) + gemini-2.5-pro (google ^gemini- prefix; google_genai: alias).
  - id: platform:gemini-2.5-pro
    name: Gemini 2.5 Pro (Platform — metered, no key)
    required_env: []
  - id: platform:gemini-2.5-flash
    name: Gemini 2.5 Flash (Platform — metered, no key)
    required_env: []
  - id: google_genai:gemini-2.5-pro
    name: Gemini 2.5 Pro (Google AI Studio — BYOK)
    required_env: [GOOGLE_API_KEY]
  - id: google_genai:gemini-2.5-flash
    name: Gemini 2.5 Flash (Google AI Studio — BYOK)
    required_env: [GOOGLE_API_KEY]

prompt_files:
  - system-prompt.md

a2a:
  port: 8000
  streaming: true

env:
  required: []
  optional:
    - GOOGLE_API_KEY
    - GOOGLE_GENAI_USE_VERTEXAI
    - GOOGLE_CLOUD_PROJECT
    - GOOGLE_CLOUD_LOCATION

template_schema_version: 1
